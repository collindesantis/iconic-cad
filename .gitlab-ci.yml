stages:
  - test
  - deploy

# python:3.12-slim has pip; we install Node from NodeSource to get v20.
# Single image avoids managing two containers and matches the GitHub CI's
# "one job, both runtimes" shape.
default:
  image: python:3.12-slim

.node-setup: &node-setup
  - apt-get update -qq && apt-get install -y -qq curl
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash - > /dev/null
  - apt-get install -y -qq nodejs

test:
  stage: test
  before_script:
    - *node-setup
    - pip install --quiet -r requirements.txt -r requirements-dev.txt
  script:
    - python -c "import shutil; shutil.copy('web/assets/lib/specs.json', '/tmp/specs_orig.json')"
    - python scripts/gen_specs.py
    - python -c "import sys,json; a=json.load(open('/tmp/specs_orig.json')); b=json.load(open('web/assets/lib/specs.json')); sys.exit('specs.json out of sync -- re-run gen_specs.py' if a!=b else 0)"
    - python -m pytest tests/test_blocking_math.py -v
    - node tests/parity.mjs
    - node tests/enumerate_parity.mjs
    - node tests/build_summary.mjs
    - node tests/foundation_parity.mjs
    - node tests/cutlist_frac.mjs
    - node tests/stock_pricing.mjs
    - node tests/foundation_cost.mjs
    - node tests/load_reset.mjs
    - node tests/canvas_resize.mjs
    - node tests/project_shape.mjs
    - node tests/fcstd_local_jszip.mjs
    - node tests/ci_verify_gate.mjs
    - node tests/export_gate.mjs
    # CAD-AUD-009 gate: committed BREP assets must not drift from the generator
    # (browser FreeCAD export translates pre-baked BREPs, not enumerateMembers()).
    - apt-get install -y -qq freecad
    - python build_lib.py --verify --no-thumbs
    - python scripts/check_links.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pages:
  stage: deploy
  image: busybox
  script:
    - mkdir -p public
    - cp -r web/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
