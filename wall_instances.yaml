# Wall Instances
# 3 concrete wall module specifications.
# Each maps to a FreeCAD .FCStd file in cad_library/
# Source: https://wiki.opensourceecology.org/wiki/Wall_instances.yaml

instances:
  - id: wall_4x8_2x6_24oc
    family: framed_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 24
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south

  - id: wall_4x8_2x6_16oc
    family: framed_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south

  - id: wall_3x8.5_2x6_16oc
    family: framed_wall_panel
    parameters:
      nominal_width_ft: 3.0
      nominal_height_ft: 8.5
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south

  # Interior walls — no OSB, 2x4 lumber
  - id: iwall_4x8_2x4_16oc
    family: interior_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x4"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0
      exterior_face: none
      reference_house_orientation: interior

  - id: iwall_4x8_2x4_24oc
    family: interior_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x4"
      stud_spacing_oc_in: 24
      osb_thickness_in: 0
      exterior_face: none
      reference_house_orientation: interior

  - id: iwall_3x8.5_2x4_single
    family: interior_wall_panel
    parameters:
      nominal_width_ft: 3.0
      nominal_height_ft: 8.5
      stud_lumber_nominal: "2x4"
      stud_spacing_oc_in: 18
      osb_thickness_in: 0
      exterior_face: none
      reference_house_orientation: interior

  # =====================================================================
  # Aperture wall panels — windows and doors.
  # A door is a window taken to the floor: same header / king-stud / jack-stud
  # logic; the window adds a sill and lower cripples. One parametric object.
  # The `aperture` block drives the opening framing. Framing dims are measured
  # from OSE source CAD — see docs/aperture_framing_reference.md.
  # Panels are 48" wide and snap exactly like a plain wall module.
  # =====================================================================

  # Exterior window — 2x6 + OSB, 36"x48" rough opening, sill at 24".
  # Available in 8', 9', and 10' module heights per OSE window spec.
  - id: window_4x8_2x6_36x48
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: window
        rough_opening_width_in: 36
        rough_opening_height_in: 48
        sill_height_in: 24            # height to top of sill (>= 24" per OSE)
        header_lumber_nominal: "2x8"
        header_plies: 2

  - id: window_4x9_2x6_36x48
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 9.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: window
        rough_opening_width_in: 36
        rough_opening_height_in: 48
        sill_height_in: 24
        header_lumber_nominal: "2x8"
        header_plies: 2

  - id: window_4x10_2x6_36x48
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 10.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: window
        rough_opening_width_in: 36
        rough_opening_height_in: 48
        sill_height_in: 24
        header_lumber_nominal: "2x8"
        header_plies: 2

  # Exterior door — 2x6 + OSB, 38"x83" rough opening, opening to the floor.
  - id: door_4x8_2x6_38x83
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: door
        rough_opening_width_in: 38
        rough_opening_height_in: 83
        sill_height_in: 0             # door: opening goes to the floor
        header_lumber_nominal: "2x8"
        header_plies: 2

  # Exterior door (out-swing) — same framing as door_4x8_2x6_38x83, swing flag only.
  - id: door_out_4x8_2x6_38x83
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: door
        rough_opening_width_in: 38
        rough_opening_height_in: 83
        sill_height_in: 0
        header_lumber_nominal: "2x8"
        header_plies: 2
        swing: out

  # Double door — 8' wide panel, 72" x 83" RO, doubled 2x12 header.
  # Standard double-door RO per IRC: two 3'-0" doors + center stile = ~72" total.
  - id: double_door_8x8_2x6_72x83
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 8.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: double_door
        rough_opening_width_in: 72
        rough_opening_height_in: 83
        sill_height_in: 0
        header_lumber_nominal: "2x12"
        header_plies: 2

  # Sliding glass door — 8' wide panel, 72" x 80" RO (standard 6-0 x 6-8 patio).
  - id: sliding_8x8_2x6_72x80
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 8.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: sliding
        rough_opening_width_in: 72
        rough_opening_height_in: 80
        sill_height_in: 0
        header_lumber_nominal: "2x12"
        header_plies: 2

  # Garage door — 9' wide panel, 96" x 84" RO (standard 8-0 x 7-0 single garage).
  # Header is a built-up LVL or doubled 2x12 over the 8' span.
  - id: garage_9x8_2x6_96x84
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 9.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x6"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0.4375
      exterior_face: south
      reference_house_orientation: faces_south
      aperture:
        type: garage
        rough_opening_width_in: 96
        rough_opening_height_in: 84
        sill_height_in: 0
        header_lumber_nominal: "2x12"
        header_plies: 2

  # Interior door — 2x4, 38"x83" rough opening (matches Seh2 8ft interior door).
  - id: idoor_4x8_2x4_38x83
    family: aperture_wall_panel
    parameters:
      nominal_width_ft: 4.0
      nominal_height_ft: 8.0
      stud_lumber_nominal: "2x4"
      stud_spacing_oc_in: 16
      osb_thickness_in: 0
      exterior_face: none
      reference_house_orientation: interior
      aperture:
        type: door
        rough_opening_width_in: 38
        rough_opening_height_in: 83
        sill_height_in: 0
        header_lumber_nominal: "2x4"
        header_plies: 1
