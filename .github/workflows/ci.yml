name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Assert specs.json is in sync with wall_instances.yaml
        run: python scripts/gen_specs.py && git diff --exit-code web/assets/lib/specs.json

      - name: Python blocking-math unit tests
        run: python -m pytest tests/test_blocking_math.py -v

      - name: JS test suite
        run: |
          node tests/parity.mjs
          node tests/enumerate_parity.mjs
          node tests/build_summary.mjs
          node tests/foundation_parity.mjs
          node tests/cutlist_frac.mjs
          node tests/stock_pricing.mjs
          node tests/foundation_cost.mjs
          node tests/load_reset.mjs
          node tests/canvas_resize.mjs
          node tests/project_shape.mjs
          node tests/fcstd_local_jszip.mjs
          node tests/ci_verify_gate.mjs
          node tests/export_gate.mjs

      - name: Check Markdown relative links
        run: python scripts/check_links.py

  # FreeCAD BREP verify is heavy (large apt install). It only matters when the
  # geometry generator or its baked assets change, so it runs as a separate
  # path-filtered job — see .github/workflows/geometry-verify.yml.
