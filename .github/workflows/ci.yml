name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Assert specs.json is in sync with wall_instances.yaml
        run: python scripts/gen_specs.py && git diff --exit-code web/assets/lib/specs.json

      - name: Python blocking-math unit tests
        run: python -m pytest tests/test_blocking_math.py -v

      - name: JS test suite
        run: |
          node tests/parity.mjs
          node tests/enumerate_parity.mjs
          node tests/build_summary.mjs
          node tests/foundation_parity.mjs
          node tests/cutlist_frac.mjs
          node tests/stock_pricing.mjs
          node tests/foundation_cost.mjs
          node tests/load_reset.mjs
          node tests/canvas_resize.mjs
          node tests/project_shape.mjs
          node tests/fcstd_local_jszip.mjs
          node tests/ci_verify_gate.mjs
          node tests/export_gate.mjs

      - name: Install FreeCAD (for BREP geometry verify)
        run: sudo apt-get update && sudo apt-get install -y freecad

      # CAD-AUD-009 gate: the browser FreeCAD export translates pre-baked BREP
      # assets, NOT enumerateMembers() at runtime. This step fails CI if those
      # committed BREP assets drift from the generator, so a framing change can
      # never silently diverge from FreeCAD export.
      - name: Verify BREP assets match the generator
        run: python build_lib.py --verify --no-thumbs

      - name: Check Markdown relative links
        run: python scripts/check_links.py
