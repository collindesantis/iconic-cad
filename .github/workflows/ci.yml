name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Assert specs.json is in sync with wall_instances.yaml
        run: python scripts/gen_specs.py && git diff --exit-code web/assets/lib/specs.json

      - name: Python blocking-math unit tests
        run: python -m pytest tests/test_blocking_math.py -v

      - name: JS parity test
        run: node tests/parity.mjs
